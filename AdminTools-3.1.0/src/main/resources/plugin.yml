name: AdminTools
version: 1.1.0
main: de.smp.admintools.AdminTools
api-version: '1.21'
description: InvSee, EnderChest, Vanish & FakePlayer for server admins
authors: [ SMP-Team ]
website: https://modrinth.com/plugin/admintools-smp

commands:
  admintools:
    description: Show help and reload config
    usage: /admintools [help|reload]
    aliases: [ at ]

  invsee:
    description: Open and edit a player's inventory (online or offline)
    usage: /invsee <player>

  ecsee:
    description: Open and edit a player's enderchest (online or offline)
    usage: /ecsee <player>

  vanish:
    description: Toggle vanish mode
    usage: /vanish <on|off>

  fakeplayer:
    description: Simulate a player joining or leaving
    usage: /fakeplayer <join|leave|list> [name]
